---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: 'Test GitHub Action 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions: {}

jobs:
  ### Comprehensive Test Suite (All Fixtures) ###
  test-comprehensive:
    name: 'Comprehensive Test Suite'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: 'audit'

      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Run comprehensive test suite'
        run: |
          echo "🧪 Running comprehensive test suite..."
          ./tests/scripts/test_all.sh

  ### Test External Repository ###
  test-external-repo:
    name: 'Test External Repository'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Checkout sample project repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: 'lfreleng-actions/test-python-project'
          path: 'test-python-project'

      # yamllint disable rule:line-length

      - name: 'Test External Project'
        id: test-external
        uses: ./
        with:
          path_prefix: 'test-python-project/'

      - name: 'Validate External Project Output'
        run: |
          echo "Build Python: '${{ steps.test-external.outputs.build_python }}'"

          # Use the raw matrix_json output and compact it with jq for consistent comparison
          actual_json=$(echo '${{ steps.test-external.outputs.matrix_json }}' | jq -c .)
          echo "Matrix JSON: '$actual_json'"

          # Validate that outputs are not empty
          if [ -z "${{ steps.test-external.outputs.build_python }}" ]; then
            echo "Error: build_python output is empty"
            exit 1
          fi
          if [ -z "${{ steps.test-external.outputs.matrix_json }}" ]; then
            echo "Error: matrix_json output is empty"
            exit 1
          fi

          # Validate matrix_json contains only valid Python versions (no text values)
          # Extract the python-version array and check each element is a valid version number
          # yamllint disable-line rule:line-length
          if ! echo "$actual_json" | jq -e '.["python-version"] | type == "array"' >/dev/null; then
            echo "Error: matrix_json does not contain a python-version array"
            exit 1
          fi

          # Check that all array elements are valid version strings (X.Y format)
          # yamllint disable-line rule:line-length
          invalid_versions=$(echo "$actual_json" | jq -r '.["python-version"][] | select(test("^[0-9]+\\.[0-9]+$") | not)')
          if [ -n "$invalid_versions" ]; then
            echo "Error: matrix_json contains invalid version entries:"
            echo "$invalid_versions"
            echo "Expected format: only numeric versions like '3.11', '3.12'"
            exit 1
          fi

          # For test-python-project, derive expected Python versions directly
          # from the classifiers in the checked-out pyproject.toml. This avoids
          # reliance on the repository-level EXPECTED_VERSION_JSON variable,
          # which is not reliably populated for pull_request events from forks
          # and also requires manual updates whenever the upstream project's
          # classifiers change. Parsing the source of truth keeps the test
          # self-contained and drift-free.
          pyproject='test-python-project/pyproject.toml'
          if [ ! -f "$pyproject" ]; then
            echo "Error: expected file not found: $pyproject"
            exit 1
          fi

          # Mirror the action's own parsing behaviour so this test
          # tracks the action's *final* sorted output:
          #   * Strip commented lines before matching classifiers, as
          #     the action does in its classifier fallback path (see
          #     'extract_classifiers_fallback' in both action.yaml and
          #     lib/constraint_utils.sh). Without this, a commented-out
          #     classifier line in pyproject.toml would produce a false
          #     mismatch.
          #   * Use the same portable numeric sort the action applies
          #     via its 'sort_versions' helper (also in action.yaml and
          #     lib/constraint_utils.sh): 'sort -t. -k1,1n -k2,2n'. This
          #     avoids relying on GNU-specific 'sort -V' and keeps the
          #     ordering identical to what the action emits in
          #     matrix_json.
          #   * Deduplicate with awk (first-seen wins) instead of
          #     'sort -u' so the numeric sort order is preserved.
          #
          # GitHub Actions runs bash with 'set -eo pipefail' by default,
          # which would make the assignment below abort the step if
          # 'grep' finds no matches (exit 1) before our explicit
          # empty-check can print a user-friendly error. Append
          # '|| true' to tolerate a no-match exit, then rely on the
          # explicit '[ -z ... ]' check to diagnose extraction failures
          # distinctly from genuine action/output disagreements.
          # yamllint disable-line rule:line-length
          classifier_versions=$(grep -v '^[[:space:]]*#' "$pyproject" | grep -oE 'Programming Language :: Python :: [0-9]+\.[0-9]+' | awk -F':: ' '{print $NF}' | sort -t. -k1,1n -k2,2n | awk '!seen[$0]++' || true)
          if [ -z "$classifier_versions" ]; then
            echo "Error: no 'Programming Language :: Python :: X.Y' classifiers found in $pyproject"
            echo "Cannot derive expected python-version list; check the upstream project or the extraction regex."
            exit 1
          fi

          # yamllint disable-line rule:line-length
          expected_json=$(printf '%s\n' "$classifier_versions" | jq -R . | jq -s -c '{"python-version": .}')
          echo "Expected (derived from classifiers): '$expected_json'"
          if [ "$expected_json" != "$actual_json" ]; then
            echo "Error: matrix_json mismatch for test-python-project"
            echo "Expected: $expected_json"
            echo "Actual:   $actual_json"
            exit 1
          fi

          echo "External repository test passed ✅"

  ### Test Missing pyproject.toml ###
  test-missing-pyproject:
    name: 'Test Missing pyproject.toml'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Create empty test directory'
        run: mkdir -p empty-test-dir

      - name: 'Test missing pyproject.toml'
        id: test-missing
        uses: ./
        with:
          path_prefix: 'empty-test-dir/'
        continue-on-error: true

      - name: 'Validate missing pyproject.toml failure'
        run: |
          if [ "${{ steps.test-missing.outcome }}" != "failure" ]; then
            echo "Error: Expected test to fail due to missing metadata files"
            exit 1
          fi
          echo "Test correctly failed when neither pyproject.toml nor setup.cfg exists"

  ### Test setup.cfg Fixtures ###
  # Exercise the legacy setuptools / PBR code path end-to-end against
  # every setup.cfg fixture in tests/fixtures/. Each matrix entry copies
  # one fixture into a freshly created workspace as 'setup.cfg' (with no
  # accompanying pyproject.toml) and asserts the action's outputs.
  test-setup-cfg-fixtures:
    name: 'Test setup.cfg Fixtures'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: requires-python-basic
            file: tests/fixtures/setup_cfg_requires_python_basic.cfg
            expected_versions: "3.10 3.11 3.12 3.13 3.14"
            expected_build: "3.14"
            expected_source: "setup.cfg"
            should_fail: 'false'
          - name: classifiers-only
            file: tests/fixtures/setup_cfg_classifiers_only.cfg
            expected_versions: "3.11 3.12 3.13"
            expected_build: "3.13"
            expected_source: "setup.cfg"
            should_fail: 'false'
          - name: pbr-legacy
            file: tests/fixtures/setup_cfg_pbr_legacy.cfg
            expected_versions: "3.10 3.11 3.12 3.13 3.14"
            expected_build: "3.14"
            expected_source: "setup.cfg"
            should_fail: 'false'
          - name: range-constraint
            file: tests/fixtures/setup_cfg_range_constraint.cfg
            expected_versions: "3.11 3.12"
            expected_build: "3.12"
            expected_source: "setup.cfg"
            should_fail: 'false'
          - name: exact-constraint
            file: tests/fixtures/setup_cfg_exact_constraint.cfg
            expected_versions: "3.12"
            expected_build: "3.12"
            expected_source: "setup.cfg"
            should_fail: 'false'
          - name: no-python-info
            file: tests/fixtures/setup_cfg_no_python_info.cfg
            should_fail: 'true'
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Prepare setup.cfg fixture workspace'
        run: |
          set -euo pipefail
          workdir="setup-cfg-fixture-${{ matrix.name }}"
          mkdir -p "$workdir"
          cp "${{ matrix.file }}" "$workdir/setup.cfg"
          # Deliberately do NOT create a pyproject.toml so the action
          # is forced down the setup.cfg branch.
          echo "WORKDIR=$workdir" >> "$GITHUB_ENV"

      - name: 'Run action on setup.cfg fixture (offline)'
        id: run
        uses: ./
        with:
          path_prefix: '${{ env.WORKDIR }}/'
          offline_mode: 'true'
        continue-on-error: ${{ matrix.should_fail == 'true' }}

      - name: 'Assert outputs for setup.cfg fixture'
        if: matrix.should_fail != 'true'
        run: |
          set -euo pipefail
          echo "Supported versions: '${{ steps.run.outputs.supported_versions }}'"
          echo "Build Python: '${{ steps.run.outputs.build_python }}'"
          echo "Metadata source: '${{ steps.run.outputs.metadata_source }}'"

          actual_json=$(echo '${{ steps.run.outputs.matrix_json }}' | jq -c .)
          echo "Matrix JSON: '$actual_json'"

          if [ "${{ steps.run.outputs.build_python }}" != "${{ matrix.expected_build }}" ]; then
            echo "Error: build_python mismatch (expected '${{ matrix.expected_build }}')"
            exit 1
          fi
          if [ "${{ steps.run.outputs.supported_versions }}" != "${{ matrix.expected_versions }}" ]; then
            echo "Error: supported_versions mismatch (expected '${{ matrix.expected_versions }}')"
            exit 1
          fi
          if [ "${{ steps.run.outputs.metadata_source }}" != "${{ matrix.expected_source }}" ]; then
            echo "Error: metadata_source mismatch (expected '${{ matrix.expected_source }}')"
            exit 1
          fi

          expected_json=$(printf '%s\n' "${{ matrix.expected_versions }}" | tr ' ' '\n' | jq -R . | jq -s -c '{"python-version": .}')
          if [ "$expected_json" != "$actual_json" ]; then
            echo "Error: matrix_json mismatch"
            echo "Expected: $expected_json"
            echo "Actual:   $actual_json"
            exit 1
          fi
          echo "setup.cfg fixture '${{ matrix.name }}' passed ✅"

      - name: 'Assert failure for setup.cfg fixture'
        if: matrix.should_fail == 'true'
        run: |
          if [ "${{ steps.run.outcome }}" != "failure" ]; then
            echo "Error: Expected fixture '${{ matrix.name }}' to fail but it succeeded"
            exit 1
          fi
          echo "setup.cfg fixture '${{ matrix.name }}' correctly failed ✅"

  ### Test Metadata Source Precedence ###
  # Confirm that when BOTH pyproject.toml and setup.cfg are present in
  # the same directory, the action consults pyproject.toml first and
  # ignores setup.cfg. This is the documented contract: setup.cfg is a
  # fallback for legacy projects, not an override for PEP 621 metadata.
  test-metadata-source-precedence:
    name: 'Test Metadata Source Precedence'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Prepare mixed-metadata workspace'
        run: |
          set -euo pipefail
          mkdir -p mixed-metadata
          # pyproject.toml declares >=3.12; setup.cfg declares >=3.10.
          # If precedence works correctly, only 3.12+ should appear.
          cat > mixed-metadata/pyproject.toml <<'TOML'
          [project]
          name = "mixed"
          version = "0.1.0"
          requires-python = ">=3.12"
          TOML
          cat > mixed-metadata/setup.cfg <<'CFG'
          [metadata]
          name = mixed
          classifiers =
              Programming Language :: Python :: 3.10
              Programming Language :: Python :: 3.11

          [options]
          python_requires = >=3.10
          CFG

      - name: 'Run action on mixed-metadata project'
        id: run
        uses: ./
        with:
          path_prefix: 'mixed-metadata/'
          offline_mode: 'true'

      - name: 'Assert pyproject.toml took precedence'
        run: |
          set -euo pipefail
          source="${{ steps.run.outputs.metadata_source }}"
          versions="${{ steps.run.outputs.supported_versions }}"
          echo "Metadata source: $source"
          echo "Supported versions: $versions"
          if [ "$source" != "pyproject.toml" ]; then
            echo "Error: expected metadata_source='pyproject.toml', got '$source'"
            exit 1
          fi
          # The pyproject.toml requires >=3.12; ensure 3.10/3.11 (from
          # setup.cfg) did not leak into the result.
          if echo "$versions" | grep -qE '(^| )3\.1[01]( |$)'; then
            echo "Error: setup.cfg values leaked through; got '$versions'"
            exit 1
          fi
          echo "Precedence honoured ✅"

  ### Test Poetry Fixtures ###
  test-poetry-fixtures:
    name: 'Test Poetry Fixtures'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: poetry-caret
            file: tests/fixtures/pyproject_poetry_caret.toml
            expected_versions: "3.10 3.11 3.12 3.13 3.14"
            expected_build: "3.14"
          - name: poetry-compatible
            file: tests/fixtures/pyproject_poetry_compatible.toml
            expected_versions: "3.11"
            expected_build: "3.11"
          - name: poetry-exact
            file: tests/fixtures/pyproject_poetry_exact.toml
            expected_versions: "3.12"
            expected_build: "3.12"
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 'Prepare fixture workspace'
        run: |
          set -euo pipefail
          workdir="poetry-fixture-${{ matrix.name }}"
          mkdir -p "$workdir"
          cp "${{ matrix.file }}" "$workdir/pyproject.toml"
          echo "WORKDIR=$workdir" >> "$GITHUB_ENV"

      - name: 'Run action on Poetry fixture (offline)'
        id: run
        uses: ./
        with:
          path_prefix: '${{ env.WORKDIR }}/'
          offline_mode: 'true'

      - name: 'Assert outputs for Poetry fixture'
        # yamllint disable rule:line-length
        run: |
          echo "Supported versions: '${{ steps.run.outputs.supported_versions }}'"
          echo "Build Python: '${{ steps.run.outputs.build_python }}'"

          # Use the raw matrix_json output and compact it with jq for consistent comparison
          actual_json=$(echo '${{ steps.run.outputs.matrix_json }}' | jq -c .)
          echo "Matrix JSON: '$actual_json'"

          if [ "${{ steps.run.outputs.build_python }}" != "${{ matrix.expected_build }}" ]; then
            echo "Error: build_python mismatch (expected '${{ matrix.expected_build }}')"
            exit 1
          fi
          if [ "${{ steps.run.outputs.supported_versions }}" != "${{ matrix.expected_versions }}" ]; then
            echo "Error: supported_versions mismatch (expected '${{ matrix.expected_versions }}')"
            exit 1
          fi

          # Construct expected JSON using jq to ensure formatting matches
          expected_json=$(printf '%s\n' "${{ matrix.expected_versions }}" | tr ' ' '\n' | jq -R . | jq -s -c '{"python-version": .}')

          if [ "$expected_json" != "$actual_json" ]; then
            echo "Error: matrix_json mismatch"
            echo "Expected: $expected_json"
            echo "Actual:   $actual_json"
            exit 1
          fi
          echo "Poetry fixture '${{ matrix.name }}' passed ✅"
